[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Redirect old WordPress URLs to new ones
[[redirects]]
  from = "/wp-admin/*"
  to = "/admin/"
  status = 301

[[redirects]]
  from = "/wp-login.php"
  to = "/admin/"
  status = 301

# Redirect music-academy to subdomain
[[redirects]]
  from = "/music-academy/*"
  to = "https://music-academy.laloingtaine.org/:splat"
  status = 301
  force = true

# Cache static assets
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
