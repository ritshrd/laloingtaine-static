backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "public/images"
public_folder: "/images"

locale: 'en'

i18n:
  structure: multiple_folders
  locales: [en, fr]
  default_locale: en

collections:
  # --- Concerts (grouped by year) ---
  - name: "concerts"
    label: "Concerts"
    label_singular: "Concert Year"
    folder: "src/content/concerts"
    create: true
    slug: "{{fields.year}}"
    identifier_field: year
    summary: "{{fields.year}}"
    i18n: true
    sortable_fields: ['year']
    fields:
      - { label: "Year", name: "year", widget: "number", value_type: "int", i18n: duplicate, hint: "e.g. 2025" }
      - label: "Concerts"
        name: "concerts"
        widget: "list"
        i18n: true
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Date", name: "date", widget: "datetime" }
          - { label: "Musicians", name: "musicians", widget: "string", required: false, hint: "e.g. Aki Saulière (Violin), Amy Norrington (Cello)" }
          - { label: "Program", name: "program", widget: "string", required: false, hint: "e.g. Beethoven — Sonata Op.24 · Brahms — Trio Op.8" }

  # --- Artists ---
  - name: "artists"
    label: "Artists / Musicians"
    folder: "src/content/artists"
    create: true
    i18n: true
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Instrument", name: "instrument", widget: "string", i18n: true }
      - { label: "Country", name: "country", widget: "string" }
      - { label: "Photo", name: "photo", widget: "image", required: false, i18n: duplicate }
      - { label: "Order", name: "order", widget: "number", default: 0 }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Biography", name: "body", widget: "markdown", i18n: true, editor_components: ["image"], modes: ["visual", "raw"] }
      - { label: "Website", name: "website", widget: "string", required: false }

  # --- Pages ---
  - name: "pages"
    label: "Pages"
    folder: "src/content/pages"
    create: true
    i18n: true
    fields:
      - { label: "Title", name: "title", widget: "string", i18n: true }
      - label: "Section"
        name: "section"
        widget: "select"
        i18n: duplicate
        options:
          - { label: "Home", value: "home" }
          - { label: "Delight", value: "delight" }
          - { label: "Learning (music)", value: "learning" }
          - { label: "Discovery", value: "discovery" }
          - { label: "Sharing", value: "sharing" }
          - { label: "About", value: "about" }
      - { label: "Order", name: "order", widget: "number", default: 0, i18n: duplicate }
      - { label: "Featured Image", name: "image", widget: "image", required: false, i18n: duplicate }
      - { label: "Body", name: "body", widget: "markdown", i18n: true, editor_components: ["image"], modes: ["visual", "raw"] }

  # --- Gallery ---
  - name: "gallery"
    label: "Photo Gallery"
    folder: "src/content/gallery"
    create: true
    media_folder: "/public/images/gallery/{{fields.year}}"
    public_folder: "/images/gallery/{{fields.year}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Year"
        name: "year"
        widget: "select"
        options:
          - { label: "2005", value: "2005" }
          - { label: "2006", value: "2006" }
          - { label: "2007", value: "2007" }
          - { label: "2008", value: "2008" }
          - { label: "2009", value: "2009" }
          - { label: "2010", value: "2010" }
          - { label: "2011", value: "2011" }
          - { label: "2012", value: "2012" }
          - { label: "2013", value: "2013" }
          - { label: "2014", value: "2014" }
          - { label: "2015", value: "2015" }
          - { label: "2016", value: "2016" }
          - { label: "2017", value: "2017" }
          - { label: "2018", value: "2018" }
          - { label: "2019", value: "2019" }
          - { label: "2020", value: "2020" }
          - { label: "2021", value: "2021" }
          - { label: "2022", value: "2022" }
          - { label: "2023", value: "2023" }
          - { label: "2024", value: "2024" }
          - { label: "2025", value: "2025" }
          - { label: "2026", value: "2026" }
      - { label: "Category", name: "category", widget: "select",
          options: ["concerts", "academies", "events", "general"] }
      - label: "Photos"
        name: "photos"
        widget: "list"
        fields:
          - { label: "Image", name: "image", widget: "image" }
          - { label: "Caption", name: "caption", widget: "string", required: false }
          - { label: "Photographer", name: "photographer", widget: "string", required: false }
