backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

locale: 'en'

i18n:
  structure: multiple_folders
  locales: [en, fr]
  default_locale: en

collections:
  # --- Concerts ---
  - name: "concerts"
    label: "Concerts"
    folder: "src/content/concerts"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    i18n: true
    sortable_fields: ['date', 'title']
    fields:
      - { label: "Title", name: "title", widget: "string", i18n: true }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Time", name: "time", widget: "string", required: false }
      - { label: "Location", name: "location", widget: "string", default: "La Loingtaine" }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - label: "Musicians"
        name: "musicians"
        widget: "list"
        i18n: true
        fields:
          - { label: "Name", name: "name", widget: "string" }
          - { label: "Instrument", name: "instrument", widget: "string", required: false }
          - { label: "Country", name: "country", widget: "string", required: false }
      - { label: "Program Details", name: "body", widget: "markdown", i18n: true }

  # --- Artists ---
  - name: "artists"
    label: "Artists / Musicians"
    folder: "src/content/artists"
    create: true
    i18n: true
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Instrument", name: "instrument", widget: "string", i18n: true }
      - { label: "Country", name: "country", widget: "string" }
      - { label: "Photo", name: "photo", widget: "image", required: false }
      - { label: "Biography", name: "body", widget: "markdown", i18n: true }
      - { label: "Website", name: "website", widget: "string", required: false }

  # --- Pages ---
  - name: "pages"
    label: "Pages"
    folder: "src/content/pages"
    create: true
    i18n: true
    fields:
      - { label: "Title", name: "title", widget: "string", i18n: true }
      - label: "Section"
        name: "section"
        widget: "select"
        options:
          - { label: "Delight", value: "delight" }
          - { label: "Learning (music)", value: "learning" }
          - { label: "Discovery", value: "discovery" }
          - { label: "Sharing", value: "sharing" }
          - { label: "About", value: "about" }
      - { label: "Order", name: "order", widget: "number", default: 0 }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown", i18n: true }

  # --- Gallery ---
  - name: "gallery"
    label: "Photo Gallery"
    folder: "src/content/gallery"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Year", name: "year", widget: "number" }
      - { label: "Category", name: "category", widget: "select",
          options: ["concerts", "academies", "events", "general"] }
      - label: "Photos"
        name: "photos"
        widget: "list"
        fields:
          - { label: "Image", name: "image", widget: "image" }
          - { label: "Caption", name: "caption", widget: "string", required: false }
          - { label: "Photographer", name: "photographer", widget: "string", required: false }
