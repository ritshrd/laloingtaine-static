backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "public/images"
public_folder: "/images"

locale: 'en'

i18n:
  structure: multiple_folders
  locales: [en, fr]
  default_locale: en

collections:
  # --- Concerts (grouped by year) ---
  - name: "concerts"
    label: "Concerts"
    label_singular: "Concert Year"
    folder: "src/content/concerts"
    create: true
    slug: "{{fields.year}}"
    identifier_field: year
    summary: "{{fields.year}}"
    i18n: true
    sortable_fields: ['year']
    fields:
      - { label: "Year", name: "year", widget: "number", value_type: "int", i18n: duplicate, hint: "e.g. 2025" }
      - label: "Concerts"
        name: "concerts"
        widget: "list"
        i18n: true
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Date", name: "date", widget: "datetime" }
          - { label: "Musicians", name: "musicians", widget: "string", required: false, hint: "e.g. Aki Saulière (Violin), Amy Norrington (Cello)" }
          - { label: "Program", name: "program", widget: "string", required: false, hint: "e.g. Beethoven — Sonata Op.24 · Brahms — Trio Op.8" }

  # --- Artists ---
  - name: "artists"
    label: "Artists / Musicians"
    folder: "src/content/artists"
    create: true
    i18n: true
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Instrument", name: "instrument", widget: "string", i18n: true }
      - { label: "Country", name: "country", widget: "string" }
      - { label: "Photo", name: "photo", widget: "image", required: false }
      - { label: "Order", name: "order", widget: "number", default: 0 }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Biography", name: "body", widget: "markdown", i18n: true }
      - { label: "Website", name: "website", widget: "string", required: false }

  # --- Pages ---
  - name: "pages"
    label: "Pages"
    folder: "src/content/pages"
    create: true
    i18n: true
    fields:
      - { label: "Title", name: "title", widget: "string", i18n: true }
      - label: "Section"
        name: "section"
        widget: "select"
        options:
          - { label: "Delight", value: "delight" }
          - { label: "Learning (music)", value: "learning" }
          - { label: "Discovery", value: "discovery" }
          - { label: "Sharing", value: "sharing" }
          - { label: "About", value: "about" }
      - { label: "Order", name: "order", widget: "number", default: 0 }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
    # - label: "Highlights"
    #   name: "highlights"
    #   widget: "list"
    #   required: false
    #   fields:
    #     - { label: "Icon (Emoji)", name: "icon", widget: "string" }
    #     - { label: "Title", name: "title", widget: "string" }
    #     - { label: "Description", name: "description", widget: "string" }
    #  - label: "Professors"
    #    name: "professors"
    #    widget: "list"
    #    required: false
    #    field: { label: "Name", name: "name", widget: "string" }
    #  - label: "Technical Details (Info Box)"
    #    name: "details"
    #    widget: "list"
    #    required: false
    #    fields:
    #      - { label: "Label", name: "label", widget: "string" }
    #      - { label: "Value", name: "value", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown", i18n: true }

  # --- Gallery ---
  - name: "gallery"
    label: "Photo Gallery"
    folder: "src/content/gallery"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Year", name: "year", widget: "number" }
      - { label: "Category", name: "category", widget: "select",
          options: ["concerts", "academies", "events", "general"] }
      - label: "Photos"
        name: "photos"
        widget: "list"
        fields:
          - { label: "Image", name: "image", widget: "image" }
          - { label: "Caption", name: "caption", widget: "string", required: false }
          - { label: "Photographer", name: "photographer", widget: "string", required: false }
